name: ArticlesIOS
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 18.0
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: BLCUFZMTP4
packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: 2.7.4
targets:
  ArticlesIOS:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: App
      - path: Shared
        excludes:
          - Views/ShareStatusView.swift
    resources:
      - App/Assets.xcassets
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - articles
    entitlements:
      path: App/ArticlesIOS.entitlements
    settings:
      base:
        PRODUCT_NAME: ArticlesIOS
        PRODUCT_BUNDLE_IDENTIFIER: com.berndplontsch.articlesios
        INFOPLIST_KEY_CFBundleDisplayName: Articles
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.news
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        GENERATE_INFOPLIST_FILE: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
    dependencies:
      - package: SwiftSoup
      - target: ArticlesShareExtension
        embed: true
      - target: ArticlesWidget
        embed: true

  ArticlesShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: ShareExtension
      - path: Shared
        excludes:
          - Views/ArticleBodyView.swift
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Save to Articles
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
    entitlements:
      path: ShareExtension/ArticlesShareExtension.entitlements
    settings:
      base:
        PRODUCT_NAME: ArticlesShareExtension
        PRODUCT_BUNDLE_IDENTIFIER: com.berndplontsch.articlesios.share
        GENERATE_INFOPLIST_FILE: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        APPLICATION_EXTENSION_API_ONLY: YES
        INFOPLIST_KEY_CFBundleDisplayName: Save to Articles
    dependencies:
      - package: SwiftSoup

  ArticlesWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Widget
      - Shared/Models/Article.swift
      - Shared/Persistence/SharedStore.swift
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: Articles Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widget/ArticlesWidget.entitlements
    settings:
      base:
        PRODUCT_NAME: ArticlesWidget
        PRODUCT_BUNDLE_IDENTIFIER: com.berndplontsch.articlesios.widget
        GENERATE_INFOPLIST_FILE: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: SwiftData.framework

  ArticlesIOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Shared
        excludes:
          - Views
      - path: Tests
        excludes:
          - Fixtures
    resources:
      - path: Tests/Fixtures
    info:
      path: Tests/Info.plist
    settings:
      base:
        PRODUCT_NAME: ArticlesIOSTests
        PRODUCT_BUNDLE_IDENTIFIER: com.berndplontsch.articlesios.tests
        GENERATE_INFOPLIST_FILE: NO
        TEST_HOST: ""
        BUNDLE_LOADER: ""
    dependencies:
      - package: SwiftSoup

schemes:
  ArticlesIOS:
    build:
      targets:
        ArticlesIOS: all
        ArticlesShareExtension: [run, test]
        ArticlesWidget: [run]
        ArticlesIOSTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ArticlesIOSTests
